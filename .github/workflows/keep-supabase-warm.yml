name: Keep Supabase Warm

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  warmup:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Call warmup endpoint
        env:
          WARMUP_ENDPOINT: https://iampdt.vercel.app/api/warmup
          WARMUP_TOKEN: ${{ secrets.WARMUP_TOKEN }}
        run: |
          if [ -z "$WARMUP_TOKEN" ]; then
            echo "Missing WARMUP_TOKEN secret."
            exit 1
          fi

          curl --retry 3 --retry-all-errors --fail --show-error --silent \
            --header "x-warmup-token: $WARMUP_TOKEN" \
            "$WARMUP_ENDPOINT"
